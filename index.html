<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мышка Сосиска — ссылки</title>
<style>
  :root{
    --pink-bg: #FCD3DE;
    --pink-bg-2: #FADAE4;
    --card: #FFEFF3;
    --card-hover: #FFFFFF;
    --plum: #6B2A46;
    --plum-soft: #A2537A;
    --twitch: #6441A5;
    --youtube: #E62117;
    --telegram: #29A9EA;
    --shadow: rgba(180, 90, 120, 0.25);
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html,body{
    height:100%;
    background: linear-gradient(180deg, var(--pink-bg) 0%, var(--pink-bg-2) 100%);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--plum);
    overflow-x:hidden;
  }

  /* ---------- Фон: сосиски и сердечки ---------- */
  .bg{
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .sausage, .heart{
    position: absolute;
    opacity: 0.5;
    will-change: transform;
    user-select: none;
    pointer-events: none;
  }

  .sausage{
    width: 84px;
    height: auto;
    filter: drop-shadow(0 4px 4px rgba(0,0,0,0.08));
  }

  .heart{
    font-size: 22px;
    color: rgba(255,255,255,0.85);
    opacity: 0.9;
  }

  @keyframes drift {
    0%   { transform: translateY(112vh) translateX(0) rotate(0deg); }
    50%  { transform: translateY(46vh) translateX(24px) rotate(180deg); }
    100% { transform: translateY(-16vh) translateX(-14px) rotate(360deg); }
  }

  @keyframes bob {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-14px); }
  }

  @keyframes wobble {
    0%,100% { transform: rotate(-3deg); }
    50%     { transform: rotate(3deg); }
  }

  /* ---------- Контент ---------- */
  .page{
    position:relative;
    z-index: 2;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 56px 20px 40px;
  }

  .avatar-wrap{
    width: 190px;
    height: 190px;
    border-radius: 50%;
    padding: 8px;
    background: linear-gradient(180deg, #FFC1D3, #FFB0C8);
    box-shadow: 0 14px 30px var(--shadow);
    animation: wobble 4s ease-in-out infinite;
  }

  .avatar{
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    background: var(--card);
  }

  .avatar img{
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .name{
    margin-top: 22px;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.01em;
    color: var(--plum);
    display:flex;
    align-items:center;
    gap: 10px;
  }

  .tagline{
    margin-top: 8px;
    font-size: 15px;
    color: var(--plum-soft);
    max-width: 320px;
    text-align:center;
  }

  .links{
    margin-top: 32px;
    width: 100%;
    max-width: 420px;
    display:flex;
    flex-direction:column;
    gap: 16px;
  }

  .link-card{
    display:flex;
    align-items:center;
    gap: 16px;
    background: var(--card);
    border: none;
    border-radius: 999px;
    padding: 16px 22px;
    text-decoration:none;
    color: var(--plum);
    font-weight: 700;
    font-size: 17px;
    box-shadow: 0 6px 16px var(--shadow);
    transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
  }

  .link-card:hover{
    transform: translateY(-2px);
    box-shadow: 0 10px 22px var(--shadow);
    background: var(--card-hover);
  }

  .link-card:active{
    transform: translateY(0);
  }

  .link-icon{
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    overflow: hidden;
    background: #fff;
  }

  .link-icon img{
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .link-text{
    flex: 1;
    text-align: center;
  }

  .chevron{
    color: var(--plum-soft);
    font-size: 18px;
    flex-shrink:0;
  }

  .socials{
    margin-top: 30px;
    display:flex;
    gap: 18px;
    font-size: 22px;
  }

  .socials span{
    color: var(--plum-soft);
    cursor: default;
  }

  footer{
    position:relative;
    z-index:2;
    margin-top: 14px;
    font-size: 14px;
    color: var(--plum-soft);
    text-align:center;
  }

  @media (prefers-reduced-motion: reduce){
    .sausage, .heart{ animation: none !important; opacity: 0.25; }
    .avatar-wrap{ animation: none !important; }
  }
</style>
</head>
